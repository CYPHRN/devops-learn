services:
  web:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ./src:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/ssl/cloudflare:/etc/ssl/cloudflare:ro
  php:
    image: skarab47/devops-learn-php:latest
    environment:
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
    volumes:
      - ./src:/var/www/html
